name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      DATABASE_URL: mongodb://127.0.0.1:27017/wedding-catalog-ci
      PAYLOAD_SECRET: ci-payload-secret-at-least-32-characters
      NEXT_PUBLIC_SERVER_URL: https://caitbridal.ie
      PREVIEW_SECRET: ci-preview-secret-at-least-24-characters
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      CRON_SECRET: ci-cron-secret-at-least-24-characters
      R2_BUCKET: ci-wedding-catalog
      R2_ACCESS_KEY_ID: ci-r2-access-key
      R2_SECRET_ACCESS_KEY: ci-r2-secret-key
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      R2_PUBLIC_URL: https://media.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Clean install
        run: npm ci

      - name: Generate Payload artifacts
        run: |
          npm run generate:types
          npm run generate:importmap

      - name: Verify generated artifacts
        run: git diff --exit-code -- src/payload-types.ts "src/app/(payload)/admin/importMap.js"

      - name: Lint
        run: npm run lint

      - name: Integration tests
        run: npm run test:int

      - name: Production build
        run: npm run build
